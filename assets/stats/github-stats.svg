<svg width="400" height="190" viewBox="0 0 400 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title  { font: 700 18px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #2f80ed; }
    .metric { font: 700 20px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #24292f; }
    .label  { font: 500 11px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #57606a; }
    .rank   { font: 700 26px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #24292f; }
    .muted  { font: 500 10px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #8c959f; }
  </style>

  <text x="22" y="33" class="title">3b1b-sh's GitHub Stats</text>

  <!-- profile rank ring -->
  <circle cx="78" cy="106" r="43" fill="none" stroke="#eaeef2" stroke-width="10"/>
  <circle cx="78" cy="106" r="43" fill="none" stroke="#2f80ed" stroke-width="10"
          pathLength="100" stroke-dasharray="72 28" stroke-linecap="round"
          transform="rotate(-90 78 106)"/>
  <text x="78" y="106" text-anchor="middle" dominant-baseline="central" class="rank">B</text>
  <text x="78" y="126" text-anchor="middle" class="muted">profile</text>

  <!-- 2x2 metric grid -->
  <text x="180" y="78"  text-anchor="middle" class="metric">12</text>
  <text x="180" y="96"  text-anchor="middle" class="label">Public Repos</text>

  <text x="290" y="78"  text-anchor="middle" class="metric">60</text>
  <text x="290" y="96"  text-anchor="middle" class="label">Total Stars</text>

  <text x="180" y="136" text-anchor="middle" class="metric">31</text>
  <text x="180" y="154" text-anchor="middle" class="label">Followers</text>

  <text x="290" y="136" text-anchor="middle" class="metric">189</text>
  <text x="290" y="154" text-anchor="middle" class="label">Contributions</text>

  <line x1="235" y1="60" x2="235" y2="156" stroke="#eaeef2" stroke-width="1"/>
  <line x1="150" y1="107" x2="370" y2="107" stroke="#eaeef2" stroke-width="1"/>

  <!-- accent strip (consistent rounded segments) -->
  <rect x="24"  y="171" width="140" height="5" rx="2.5" fill="#2f80ed"/>
  <rect x="166" y="171" width="78"  height="5" rx="2.5" fill="#8b5cf6"/>
  <rect x="246" y="171" width="78"  height="5" rx="2.5" fill="#22c55e"/>
  <rect x="326" y="171" width="46"  height="5" rx="2.5" fill="#f97316"/>
</svg>
