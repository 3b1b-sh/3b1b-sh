<svg width="880" height="230" viewBox="0 0 880 230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gubin (Eric) Hu — Embodied AI · Humanoid Robot Learning">
  <defs>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <text x="26" y="46" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4" fill="#58a6ff">HELLO, I AM</text>
  <text x="24" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#e6edf3">Gubin (Eric) Hu</text>
  <text x="26" y="124" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#9198a1">Embodied AI · Humanoid Robot Learning</text>
  <text x="26" y="148" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6e7681">B.Eng. @ ShanghaiTech University → incoming PhD @ Fudan University · Shanghai, China</text>

  <rect x="26" y="162" width="136" height="26" rx="13" fill="none" stroke="#30363d"/>
  <text x="94" y="179" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="600" fill="#9198a1">Whole-body Control</text>
  <rect x="174" y="162" width="124" height="26" rx="13" fill="none" stroke="#30363d"/>
  <text x="236" y="179" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="600" fill="#9198a1">Motion Imitation</text>
  <rect x="310" y="162" width="166" height="26" rx="13" fill="none" stroke="#30363d"/>
  <text x="393" y="179" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="600" fill="#9198a1">Unitree G1 · Real Robot</text>

  <!-- waving robot -->
  <g stroke-linecap="round">
    <ellipse cx="778" cy="208" rx="46" ry="6" fill="#21262d"/>
    <!-- antenna -->
    <line x1="778" y1="42" x2="778" y2="31" stroke="#9198a1" stroke-width="3"/>
    <circle cx="778" cy="26" r="4" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0.25;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <!-- head -->
    <rect x="757" y="42" width="42" height="32" rx="9" fill="none" stroke="#9198a1" stroke-width="4"/>
    <circle cx="770" cy="58" r="3.4" fill="#58a6ff"/>
    <circle cx="786" cy="58" r="3.4" fill="#58a6ff"/>
    <!-- torso -->
    <line x1="778" y1="78" x2="778" y2="132" stroke="#9198a1" stroke-width="6"/>
    <!-- left arm -->
    <polyline points="778,92 748,112 740,138" stroke="#9198a1" stroke-width="5" fill="none"/>
    <!-- right arm: upper + waving forearm -->
    <line x1="778" y1="92" x2="812" y2="76" stroke="#9198a1" stroke-width="5"/>
    <g>
      <line x1="812" y1="76" x2="830" y2="50" stroke="#9198a1" stroke-width="5"/>
      <circle cx="830" cy="50" r="6" fill="#a78bfa"/>
      <animateTransform attributeName="transform" type="rotate" values="0 812 76; 24 812 76; -8 812 76; 24 812 76; 0 812 76" keyTimes="0;0.3;0.5;0.7;1" dur="2.6s" repeatCount="indefinite"/>
    </g>
    <!-- legs -->
    <polyline points="778,132 760,170 758,202" stroke="#9198a1" stroke-width="5" fill="none"/>
    <polyline points="778,132 796,170 798,202" stroke="#9198a1" stroke-width="5" fill="none"/>
    <!-- joints -->
    <circle cx="778" cy="92" r="4.5" fill="#58a6ff"/>
    <circle cx="748" cy="112" r="4.5" fill="#a78bfa"/>
    <circle cx="812" cy="76" r="4.5" fill="#a78bfa"/>
    <circle cx="778" cy="132" r="4.5" fill="#58a6ff"/>
    <circle cx="760" cy="170" r="4.5" fill="#a78bfa"/>
    <circle cx="796" cy="170" r="4.5" fill="#a78bfa"/>
  </g>

  <rect x="24" y="214" width="832" height="3" rx="1.5" fill="url(#rule)"/>
</svg>
